<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="3" fill="#1A1917"/>
  <!-- A→C edge (sage) -->
  <line x1="16" y1="4" x2="27" y2="22" stroke="#7FA383" stroke-width="1.2" stroke-linecap="round"/>
  <!-- C→S edge (copper) -->
  <line x1="27" y1="22" x2="5" y2="22" stroke="#D4936F" stroke-width="1.2" stroke-linecap="round"/>
  <!-- S→A edge (blue) -->
  <line x1="5" y1="22" x2="16" y2="4" stroke="#6FA3D4" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Vertex dots -->
  <circle cx="16" cy="4" r="2" fill="#7FA383"/>
  <circle cx="27" cy="22" r="2" fill="#D4936F"/>
  <circle cx="5" cy="22" r="2" fill="#6FA3D4"/>
</svg>
