name: Restormel Design Task
description: Track design surface work mapped from Restormel design backlog.
title: "design: "
labels:
  - restormel
  - design
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      placeholder: Improve Docs Experience surface for onboarding and schema readability.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include target user and flow constraints.
    validations:
      required: true

  - type: textarea
    id: linked_docs
    attributes:
      label: Linked Docs
      placeholder: |
        - docs/restormel/05-design/21-design-backlog-by-surface.md
        - docs/restormel/03-product/06-site-pages-outline-and-content-requirements.md
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      placeholder: |
        In scope:
        - surface-level layout/copy/motion decisions

        Out of scope:
        - backend APIs
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Design intent is clear to engineering
        - [ ] Hand-off artifacts linked
        - [ ] States and edge cases covered
    validations:
      required: true

  - type: textarea
    id: affected_areas
    attributes:
      label: Affected Areas / Packages
      placeholder: |
        - docs/restormel/05-design/...
        - src/routes/...
        - static/assets/...
    validations:
      required: true
