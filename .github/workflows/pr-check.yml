# SOPHIA — Pull Request Checks
#
# Runs on every PR to main. Performs security scanning, dependency auditing,
# type checking, and build verification. Does NOT deploy.

name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for secret scanning

      - name: Scan for secrets
        if: github.event.pull_request.base.sha != github.event.pull_request.head.sha
        uses: trufflesecurity/trufflehog@v3.68.0
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true  # Surface high/critical vulns without blocking the PR

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build
