# SOPHIA — Pull Request Checks
#
# Lightweight gate that runs on every PR. The full security scan, type check,
# and infra preview are handled by the unified CI/CD workflow (deploy.yml).
# This workflow ensures the build succeeds and dependencies are audited before
# merge, acting as a fast required status check for branch protection.

name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        if: github.event.pull_request.base.sha != github.event.pull_request.head.sha
        uses: trufflesecurity/trufflehog@v3.68.0
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build
