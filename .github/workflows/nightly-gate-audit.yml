name: Nightly Gate Audit

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  DB_INSTANCE: sophia-db
  DB_ZONE: europe-west2-b
  DB_LOCAL_PORT: 8800
  SURREAL_USER: root
  SURREAL_NAMESPACE: sophia
  SURREAL_DATABASE: sophia

jobs:
  phase1-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Start IAP tunnel to SurrealDB
        run: |
          gcloud compute ssh "${DB_INSTANCE}" \
            --zone="${DB_ZONE}" \
            --project="${PROJECT_ID}" \
            --quiet \
            --tunnel-through-iap \
            -- -L "${DB_LOCAL_PORT}:localhost:8000" -N \
            >/tmp/sophia-nightly-db-tunnel.log 2>&1 &
          echo "TUNNEL_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for DB tunnel
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost "${DB_LOCAL_PORT}"; then
              echo "Tunnel is up"
              exit 0
            fi
            sleep 2
          done
          echo "Tunnel failed to start"
          cat /tmp/sophia-nightly-db-tunnel.log || true
          exit 1

      - name: Load DB credentials from Secret Manager
        run: |
          echo "SURREAL_PASS=$(gcloud secrets versions access latest --secret=surreal-db-pass --project=${PROJECT_ID})" >> "$GITHUB_ENV"
          echo "SURREAL_URL=http://localhost:${DB_LOCAL_PORT}" >> "$GITHUB_ENV"

      - name: Run Phase 1 gate audit (dry-run)
        run: pnpm exec tsx scripts/phase1-closeout.ts --dry-run

      - name: Stop IAP tunnel
        if: always()
        run: |
          if [ -n "${TUNNEL_PID:-}" ]; then
            kill "${TUNNEL_PID}" || true
          fi
