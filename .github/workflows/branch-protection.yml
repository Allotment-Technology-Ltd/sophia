# SOPHIA — Branch Protection Setup
#
# Applies branch protection rules to main:
#   - Required status check: "security" (runs on every PR and push to main)
#   - Strict status checks (branch must be up-to-date before merging)
#   - Required pull request review (at least 0 approving reviews — enforces PR workflow)
#   - No push restrictions (any collaborator may push via PR)
#
# Triggers automatically on every push to main so protection rules are always
# in force. Can also be run manually via workflow_dispatch.
#
# Requires the GITHUB_TOKEN to have administration:write permission, which
# is granted below. This works for repositories owned by organisations that
# allow GitHub Actions to administer the repository.

name: Set Up Branch Protection

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  administration: write

jobs:
  protect-main:
    runs-on: ubuntu-latest

    steps:
      - name: Apply branch protection to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                contexts: ['security']
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 0
              },
              restrictions: null
            });
            console.log('Branch protection successfully applied to main.');
