# SOPHIA — Branch Protection Setup
#
# Applies branch protection rules to main:
#   - Required status checks: "security" and "codeql" (CI/CD jobs in deploy.yml).
#   - Aikido (GitHub App PR checks): add the check name shown on a PR after Aikido runs —
#     not an Actions job. Do not use Aikido’s CI Action if the PR checks app is enabled.
#   - Strict status checks (branch must be up-to-date before merging)
#   - Required pull request review (at least 0 approving reviews — enforces PR workflow)
#   - No push restrictions (any collaborator may push via PR)
#
# Runs manually via workflow_dispatch.

name: Set Up Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protect-main:
    runs-on: ubuntu-latest

    steps:
      - name: Apply branch protection to main
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                contexts: ['security', 'codeql']
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 0
              },
              restrictions: null
            });
            console.log('Branch protection successfully applied to main.');
