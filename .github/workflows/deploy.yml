name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_app_deploy:
        description: "Run DB migrate + Railway deploy even without detected deploy-path changes"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
      neon_migrate: ${{ steps.filter.outputs.neon_migrate }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            neon_migrate:
              - 'drizzle/**'
              - 'scripts/neon-migrate.ts'
            deploy:
              - 'src/**'
              - 'scripts/**'
              - 'packages/**'
              - 'drizzle/**'
              - 'static/**'
              - 'Dockerfile'
              - 'Dockerfile.ingest'
              - 'Dockerfile.ingest-worker'
              - 'railway.toml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'svelte.config.js'
              - 'vite.config.js'
              - 'postcss.config.js'
              - 'tailwind.config.js'
              - '.github/workflows/deploy.yml'
              - 'data/sep-entry-urls.json'
              - 'data/sep-topic-presets.json'
              - 'data/sources/**'

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.94.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Scan for secrets (full repo)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@v3.94.2
        with:
          path: ./
          extra_args: --only-verified

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert Restormel staging verification secrets
        if: github.event_name == 'pull_request'
        env:
          RESTORMEL_GATEWAY_KEY: ${{ secrets.RESTORMEL_GATEWAY_KEY_STAGING }}
          RESTORMEL_PROJECT_ID: ${{ secrets.RESTORMEL_PROJECT_ID_STAGING }}
          RESTORMEL_ENVIRONMENT_ID: ${{ secrets.RESTORMEL_ENVIRONMENT_ID_STAGING }}
        run: |
          test -n "$RESTORMEL_GATEWAY_KEY" || { echo "Missing RESTORMEL_GATEWAY_KEY_STAGING"; exit 1; }
          test -n "$RESTORMEL_PROJECT_ID" || { echo "Missing RESTORMEL_PROJECT_ID_STAGING"; exit 1; }
          test -n "$RESTORMEL_ENVIRONMENT_ID" || { echo "Missing RESTORMEL_ENVIRONMENT_ID_STAGING"; exit 1; }

      - name: Restormel Doctor
        if: github.event_name == 'pull_request'
        run: npx @restormel/doctor

      - name: Restormel Validate
        if: github.event_name == 'pull_request'
        env:
          RESTORMEL_GATEWAY_KEY: ${{ secrets.RESTORMEL_GATEWAY_KEY_STAGING }}
          RESTORMEL_PROJECT_ID: ${{ secrets.RESTORMEL_PROJECT_ID_STAGING }}
          RESTORMEL_ENVIRONMENT_ID: ${{ secrets.RESTORMEL_ENVIRONMENT_ID_STAGING }}
          RESTORMEL_KEYS_BASE: ${{ secrets.RESTORMEL_KEYS_BASE_STAGING }}
        run: npx @restormel/validate

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Type check
        run: pnpm check

      - name: Surreal SCHEMAFULL write lint
        run: pnpm check:surreal-writes

      - name: Minimal TS project (ingest CLI)
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Verify prod ingest module graph
        run: bash scripts/verify-prod-ingest-isolated.sh

      - name: Build (verify)
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: postgresql://sveltekit_build_placeholder@127.0.0.1:5432/postgres?sslmode=disable
        run: pnpm build

  codeql:
    needs: [changes]
    if: >
      success() &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  deploy-neon-migrate:
    if: >
      success() &&
      github.ref == 'refs/heads/main' &&
      (
        (
          github.event_name == 'push' &&
          (
            needs.changes.outputs.deploy == 'true' ||
            needs.changes.outputs.neon_migrate == 'true'
          )
        ) ||
        (github.event_name == 'workflow_dispatch' && inputs.force_app_deploy == true)
      )
    needs: [changes, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (Neon migrate)
        run: pnpm install --frozen-lockfile

      - name: Run Neon database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::Missing repository secret DATABASE_URL_PRODUCTION (Neon connection string)."
            exit 1
          fi
          pnpm db:migrate:ci

  deploy-railway:
    if: >
      success() &&
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' && needs.changes.outputs.deploy == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.force_app_deploy == true)
      )
    needs: [changes, security, deploy-neon-migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Assert Railway deploy secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
        run: |
          test -n "$RAILWAY_TOKEN" || { echo "Missing RAILWAY_TOKEN secret"; exit 1; }
          test -n "$RAILWAY_PROJECT_ID" || { echo "Missing RAILWAY_PROJECT_ID repository variable"; exit 1; }
          test -n "$RAILWAY_SERVICE" || { echo "Missing RAILWAY_SERVICE repository variable"; exit 1; }

      - name: Install Railway CLI
        run: npm install --global @railway/cli@4.40.0

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}
        run: |
          set -euo pipefail
          ARGS=(
            --ci
            --detach
            --project "$RAILWAY_PROJECT_ID"
            --service "$RAILWAY_SERVICE"
          )
          if [ -n "${RAILWAY_ENVIRONMENT:-}" ]; then
            ARGS+=(--environment "$RAILWAY_ENVIRONMENT")
          fi
          railway up "${ARGS[@]}"
