name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_app_deploy:
        description: "Run DB migrate + Railway deploy even without detected deploy-path changes"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
      neon_migrate: ${{ steps.filter.outputs.neon_migrate }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            neon_migrate:
              - 'drizzle/**'
              - 'scripts/neon-migrate.ts'
            deploy:
              - '.github/workflows/ingestion-job-tick.yml'
              - 'src/**'
              - 'scripts/**'
              - 'packages/**'
              - 'drizzle/**'
              - 'static/**'
              - 'Dockerfile'
              - 'Dockerfile.ingest'
              - 'Dockerfile.ingest-worker'
              - 'railway.toml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'svelte.config.js'
              - 'vite.config.js'
              - 'postcss.config.js'
              - 'tailwind.config.js'
              - '.github/workflows/deploy.yml'
              - 'data/sep-entry-urls.json'
              - 'data/sep-topic-presets.json'
              - 'data/sources/**'

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Scan for secrets (full repo)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          path: ./
          extra_args: --only-verified

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert Restormel staging verification secrets
        if: github.event_name == 'pull_request'
        env:
          RESTORMEL_GATEWAY_KEY: ${{ secrets.RESTORMEL_GATEWAY_KEY_STAGING }}
          RESTORMEL_PROJECT_ID: ${{ secrets.RESTORMEL_PROJECT_ID_STAGING }}
          RESTORMEL_ENVIRONMENT_ID: ${{ secrets.RESTORMEL_ENVIRONMENT_ID_STAGING }}
        run: |
          test -n "$RESTORMEL_GATEWAY_KEY" || { echo "Missing RESTORMEL_GATEWAY_KEY_STAGING"; exit 1; }
          test -n "$RESTORMEL_PROJECT_ID" || { echo "Missing RESTORMEL_PROJECT_ID_STAGING"; exit 1; }
          test -n "$RESTORMEL_ENVIRONMENT_ID" || { echo "Missing RESTORMEL_ENVIRONMENT_ID_STAGING"; exit 1; }

      - name: Restormel Doctor
        if: github.event_name == 'pull_request'
        run: npx @restormel/doctor

      - name: Restormel Validate
        if: github.event_name == 'pull_request'
        env:
          RESTORMEL_GATEWAY_KEY: ${{ secrets.RESTORMEL_GATEWAY_KEY_STAGING }}
          RESTORMEL_PROJECT_ID: ${{ secrets.RESTORMEL_PROJECT_ID_STAGING }}
          RESTORMEL_ENVIRONMENT_ID: ${{ secrets.RESTORMEL_ENVIRONMENT_ID_STAGING }}
          RESTORMEL_KEYS_BASE: ${{ secrets.RESTORMEL_KEYS_BASE_STAGING }}
        run: npx @restormel/validate

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Type check
        run: pnpm check

      - name: Surreal SCHEMAFULL write lint
        run: pnpm check:surreal-writes

      - name: Minimal TS project (ingest CLI)
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Verify prod ingest module graph
        run: bash scripts/verify-prod-ingest-isolated.sh

      - name: Build (verify)
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: postgresql://sveltekit_build_placeholder@127.0.0.1:5432/postgres?sslmode=disable
        run: pnpm build

  codeql:
    needs: [changes]
    if: >
      success() &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  # Single job: Neon migrate then Railway. Splitting into two `needs` steps meant any skipped or
  # structurally-broken upstream job could skip `deploy-railway` entirely. One linear job is easier
  # to reason about: migrate fails → job fails; migrate skipped path doesn’t block `railway up`.
  deploy-production:
    if: >
      success() &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.force_app_deploy == true)
      )
    needs: [changes, security]
    runs-on: ubuntu-latest
    # Default token only has `contents: read` — the Railway CLI’s Git context needs status write to
    # use the repo for deploy source (same as typical railway/github-actions patterns).
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: true

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (migrations)
        run: pnpm install --frozen-lockfile

      - name: Run Neon database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::warning::Repository secret DATABASE_URL_PRODUCTION is not set; skipping Neon migrate. Railway deploy still runs."
            exit 0
          fi
          pnpm db:migrate:ci

      - name: Assert Railway deploy secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
        run: |
          set -euo pipefail
          test -n "${RAILWAY_TOKEN:-}" || { echo "::error::Missing RAILWAY_TOKEN (GitHub Actions secret)"; exit 1; }
          test -n "${RAILWAY_PROJECT_ID:-}" || { echo "::error::Missing RAILWAY_PROJECT_ID (repository variable)"; exit 1; }
          test -n "${RAILWAY_SERVICE:-}" || { echo "::error::Missing RAILWAY_SERVICE (repository variable). Create one at repo Settings → Secrets and variables → Variables."; exit 1; }
          echo "RAILWAY_PROJECT_ID length OK (${#RAILWAY_PROJECT_ID} chars), service=${RAILWAY_SERVICE}"

      - name: Install Railway CLI
        run: npm install --global @railway/cli@4.40.0

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}
          RAILWAY_BUILD_LOGS: "1"
        run: |
          set -euo pipefail
          if ! command -v railway >/dev/null; then
            echo "::error::railway CLI not on PATH"
            exit 1
          fi
          if [ ! -f Dockerfile ] || [ ! -f package.json ]; then
            echo "::error::Not at repo root (expected Dockerfile, package.json). pwd=$(pwd)"
            ls -la
            exit 1
          fi
          echo "RAILWAY_CLI: $(command -v railway) ($(railway --version 2>&1 || true))"
          echo "RAILWAY_ENVIRONMENT=${RAILWAY_ENVIRONMENT:-<default>}"
          # Important: do NOT use --detach. If we detach, the GitHub job can succeed while the Railway build/deploy
          # fails asynchronously, forcing manual redeploy after the pipeline completes.
          ARGS=(--ci --path-as-root . --project "$RAILWAY_PROJECT_ID" --service "$RAILWAY_SERVICE")
          if [ -n "${RAILWAY_ENVIRONMENT:-}" ]; then
            ARGS+=(--environment "$RAILWAY_ENVIRONMENT")
          fi
          echo "Running: railway up ${ARGS[*]}"
          railway up "${ARGS[@]}"
          echo "railway up finished successfully (deployment completed)"

      - name: Post-deploy health check (production)
        env:
          HEALTH_URL: "https://usesophia.app/api/health"
        run: |
          set -euo pipefail
          echo "Checking health: ${HEALTH_URL}"
          for i in $(seq 1 24); do
            if curl -fsS --max-time 10 "${HEALTH_URL}" >/dev/null; then
              echo "Health OK"
              exit 0
            fi
            echo "Health not ready (attempt ${i}/24); waiting 10s…"
            sleep 10
          done
          echo "::error::Health check failed after deploy"
          exit 1
