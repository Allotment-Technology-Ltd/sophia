# SOPHIA — Google Cloud Run Deployment Pipeline
#
# PREREQUISITES:
# 1. GCP project with Cloud Run API enabled
# 2. Secrets stored in Secret Manager (all must exist before first deploy):
#    - anthropic-api-key   Claude API key
#    - voyage-api-key      Voyage AI embeddings key
#    - google-ai-api-key   Gemini validation key
#    - surreal-db-pass     SurrealDB root password
# 3. Workload Identity Federation configured for GitHub:
#    https://github.com/google-github-actions/auth#setting-up-workload-identity-federation
# 4. GitHub secrets configured:
#    - WIF_PROVIDER: projects/{PROJECT_ID}/locations/global/workloadIdentityPools/{POOL_ID}/providers/{PROVIDER_ID}
#    - WIF_SERVICE_ACCOUNT: terraform-sa@{PROJECT_ID}.iam.gserviceaccount.com
#    - GCP_PROJECT_ID: sophia-488807
#
# SURREALDB SETUP:
# - SurrealDB runs on GCE VM 'sophia-db' in europe-west2-b (zone: europe-west2-b)
# - Internal IP: 10.154.0.2  (stable — assigned at VM creation, does not change)
# - External IP: 35.246.25.125 (for local admin access only)
# - Cloud Run connects to SurrealDB via the internal IP over the shared VPC
# - If DB is unreachable, the app degrades gracefully: no graph context injected
#   into the three-pass engine, but all philosophical reasoning still works
#
# VPC CONNECTOR (required for Cloud Run → GCE internal IP access):
# Create once — idempotent, safe to re-run:
#
#   gcloud compute networks vpc-access connectors create sophia-connector \
#     --region=europe-west2 \
#     --network=default \
#     --range=10.8.0.0/28 \
#     --project=sophia-488807
#
# Verify connector is READY before deploying:
#   gcloud compute networks vpc-access connectors describe sophia-connector \
#     --region=europe-west2 --project=sophia-488807
#
# NOTE: There is a legacy 'sophia' service in europe-west1 from an earlier deploy.
# It can be deleted once this pipeline has run successfully:
#   gcloud run services delete sophia --region=europe-west1 --project=sophia-488807

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for secret scanning

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true  # Surface high/critical vulns without blocking deploy

      - name: Type check
        run: pnpm check

  deploy:
    needs: security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy sophia \
            --source . \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=europe-west2 \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --vpc-connector=sophia-connector \
            --vpc-egress=private-ranges-only \
            --set-env-vars="SURREAL_URL=ws://10.154.0.2:8000/rpc,SURREAL_USER=root,SURREAL_NAMESPACE=sophia,SURREAL_DATABASE=sophia" \
            --set-secrets="ANTHROPIC_API_KEY=anthropic-api-key:latest,SURREAL_PASS=surreal-db-pass:latest,VOYAGE_API_KEY=voyage-api-key:latest,GOOGLE_AI_API_KEY=google-ai-api-key:latest"
