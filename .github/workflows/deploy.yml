# SOPHIA — Unified CI/CD Pipeline
#
# Application deployments are driven by this workflow: Docker build → Artifact Registry →
# `gcloud run deploy` with `--set-secrets` / `--set-env-vars`. There is no Pulumi or other
# paid IaC runtime in-repo; GCP layout is documented in `docs/operations/gcp-infrastructure.md`.
#
#   src/**, scripts/**, docs/**, Dockerfile, repomix*.config.json, .gitignore, etc.  →  app-deploy
#
# TARGET REGION: europe-west2 (London) — all resources are in this region.
# Region drift was resolved in March 2026: the live us-central1 service was
# migrated to europe-west2 where the database VM already lives.
#
# PREREQUISITES:
# ─ GCP secrets in Secret Manager: anthropic-api-key, voyage-api-key,
#   google-ai-api-key, surreal-db-url, surreal-db-user, surreal-db-pass,
#   surreal-db-namespace, surreal-db-database, admin-uids, owner-uids (maps to env OWNER_UIDS),
#   neon-database-url → DATABASE_URL (required; ingest + sophia_documents / sophiaDocumentsDb)
# ─ GitHub secret: NEON_AUTH_BASE_URL (same value for VITE_NEON_AUTH_URL at build + runtime JWT verify)
# ─ Workload Identity Federation configured for this GitHub repo
#
# Secret → Cloud Run binding: every app-deploy runs `gcloud run deploy … --set-secrets=…`
# (see app-deploy job). Rotated GCP secrets with no repo diff: run this workflow via
# workflow_dispatch with force_app_deploy=true.
# ─ GitHub repository secrets:
#     WIF_PROVIDER        projects/{N}/locations/global/workloadIdentityPools/{P}/providers/{ID}
#     WIF_SERVICE_ACCOUNT github-deploy@sophia-488807.iam.gserviceaccount.com
#     GCP_PROJECT_ID      sophia-488807
#
# AIKIDO: This repo uses the GitHub App for PR checks. Do NOT add AikidoSec/github-actions-workflow
#   here — Aikido returns 422 if both are enabled. PR scans appear as a separate check from the app.
#
# AIKIDO / PR CHECKS (mutually exclusive with the Aikido GitHub Action):
#   If the repo uses Aikido’s GitHub App for PR checks, do NOT add
#   AikidoSec/github-actions-workflow — Aikido returns 422. PR scans and status on PRs
#   come from the installed GitHub App (see user-facing locations below), not from this file.
#
# VPC CONNECTOR STATUS:
#   The sophia-connector is now in europe-west2 (was europe-west1).
#   Cloud Run uses private egress to reach SurrealDB at 10.154.0.2:8000.
#
# ROLLBACK:
#   Trigger the "Rollback App" workflow_dispatch with a Cloud Run revision name.
#   For GCP resource changes, use the Cloud Console or `gcloud` (see gcp-infrastructure.md).
#
# AIKIDO: https://app.aikido.dev/ — GitHub App posts PR checks; Settings → GitHub Apps → Aikido.
# AIKIDO: Configure in https://app.aikido.dev/ (PR gating, AutoFix). On GitHub: Settings →
#   Integrations → GitHub Apps (org or user) → Aikido, or repo Settings → GitHub Apps /
#   Installed GitHub Apps. The app posts PR checks; add that check name under branch
#   protection if merges should wait on Aikido.
# AIKIDO: Dashboard (https://app.aikido.dev/) handles PR gating and AutoFix. Either:
#   (A) GitHub App — Settings → GitHub Apps → Aikido; the app posts its own PR check name.
#   (B) Action — the `aikido` job below (needs AIKIDO_SECRET_KEY); add job id `aikido` to
#       branch protection. Do not enable both the App scan and this Action (422 risk).

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_revision:
        description: "Cloud Run revision to roll back to (e.g. sophia-00042-abc)"
        required: false
        type: string
      force_app_deploy:
        description: "Run Docker build + gcloud run deploy (e.g. after empty commit or secret-only GCP changes)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  REGION: europe-west2
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: europe-west2-docker.pkg.dev
  IMAGE_BASE: europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sophia/app

jobs:
  # ── 1. Detect which paths changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'scripts/**'
              - 'static/**'
              - 'docs/**'
              - 'Dockerfile'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'svelte.config.js'
              - 'vite.config.js'
              - 'postcss.config.js'
              - 'tailwind.config.js'
              - '.github/workflows/deploy.yml'
              - '.gitignore'
              - 'repomix.config.json'
              - 'repomix.config.json5'
              - 'repomix.config.jsonc'
              - 'repomix.knowledge-base.config.json'

  # ── 2. Security & quality gate (always runs) ───────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.94.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Scan for secrets (full repo)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@v3.94.2
        with:
          path: ./
          extra_args: --only-verified

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Assert Restormel staging verification secrets
        if: github.event_name == 'pull_request'
        env:
          RESTORMEL_GATEWAY_KEY: ${{ secrets.RESTORMEL_GATEWAY_KEY_STAGING }}
          RESTORMEL_PROJECT_ID: ${{ secrets.RESTORMEL_PROJECT_ID_STAGING }}
          RESTORMEL_ENVIRONMENT_ID: ${{ secrets.RESTORMEL_ENVIRONMENT_ID_STAGING }}
        run: |
          test -n "$RESTORMEL_GATEWAY_KEY" || { echo "Missing RESTORMEL_GATEWAY_KEY_STAGING"; exit 1; }
          test -n "$RESTORMEL_PROJECT_ID" || { echo "Missing RESTORMEL_PROJECT_ID_STAGING"; exit 1; }
          test -n "$RESTORMEL_ENVIRONMENT_ID" || { echo "Missing RESTORMEL_ENVIRONMENT_ID_STAGING"; exit 1; }

      - name: Restormel Doctor
        if: github.event_name == 'pull_request'
        run: npx @restormel/doctor

      - name: Restormel Validate
        if: github.event_name == 'pull_request'
        env:
          RESTORMEL_GATEWAY_KEY: ${{ secrets.RESTORMEL_GATEWAY_KEY_STAGING }}
          RESTORMEL_PROJECT_ID: ${{ secrets.RESTORMEL_PROJECT_ID_STAGING }}
          RESTORMEL_ENVIRONMENT_ID: ${{ secrets.RESTORMEL_ENVIRONMENT_ID_STAGING }}
          RESTORMEL_KEYS_BASE: ${{ secrets.RESTORMEL_KEYS_BASE_STAGING }}
        run: npx @restormel/validate

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Type check
        run: pnpm check

      - name: Minimal TS project (ingest CLI)
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Verify prod ingest module graph (Cloud Run parity)
        run: bash scripts/verify-prod-ingest-isolated.sh

      - name: Build (verify)
        if: github.event_name == 'pull_request'
        env:
          # Same guard as Dockerfile builder: server modules require DATABASE_URL during vite build.
          DATABASE_URL: postgresql://sveltekit_build_placeholder@127.0.0.1:5432/postgres?sslmode=disable
        run: pnpm build

  # ── 2b. CodeQL scan (in unified pipeline) ──────────────────────────────────
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  # ── 3. Build & deploy app ──────────────────────────────────────────────────
  app-deploy:
    if: >
      always() &&
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' && needs.changes.outputs.app == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.force_app_deploy == true)
      )
    needs: [changes, security, codeql]
    runs-on: ubuntu-latest
    env:
      RESTORMEL_GATEWAY_KEY: ${{ secrets.RESTORMEL_GATEWAY_KEY_PRODUCTION || secrets.RESTORMEL_GATEWAY_KEY_STAGING }}
      RESTORMEL_PROJECT_ID: ${{ secrets.RESTORMEL_PROJECT_ID_PRODUCTION || secrets.RESTORMEL_PROJECT_ID_STAGING }}
      RESTORMEL_ENVIRONMENT_ID: ${{ secrets.RESTORMEL_ENVIRONMENT_ID_PRODUCTION || secrets.RESTORMEL_ENVIRONMENT_ID_STAGING }}
      RESTORMEL_KEYS_BASE: ${{ secrets.RESTORMEL_KEYS_BASE_PRODUCTION || secrets.RESTORMEL_KEYS_BASE_STAGING || 'https://restormel.dev/keys/dashboard' }}
      RESTORMEL_BASE_URL: ${{ secrets.RESTORMEL_BASE_URL_PRODUCTION || secrets.RESTORMEL_KEYS_BASE_PRODUCTION || secrets.RESTORMEL_KEYS_BASE_STAGING || 'https://restormel.dev/keys/dashboard' }}
      RESTORMEL_ANALYSE_ROUTE_ID: ${{ secrets.RESTORMEL_ANALYSE_ROUTE_ID_PRODUCTION || secrets.RESTORMEL_ANALYSE_ROUTE_ID_STAGING }}
      RESTORMEL_VERIFY_ROUTE_ID: ${{ secrets.RESTORMEL_VERIFY_ROUTE_ID_PRODUCTION || secrets.RESTORMEL_VERIFY_ROUTE_ID_STAGING }}
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build Docker image
        env:
          # Same value as Cloud Run NEON_AUTH_BASE_URL; baked into client bundle as VITE_NEON_AUTH_URL.
          VITE_NEON_AUTH_URL: ${{ secrets.NEON_AUTH_BASE_URL }}
        run: |
          if [ -z "$VITE_NEON_AUTH_URL" ]; then
            echo "::error::Repository secret NEON_AUTH_BASE_URL is not set. Add it under Settings → Secrets and variables → Actions (Neon Console → branch → Auth → base_url, ends with /…/auth). Without it, production shows 'Neon Auth is not configured'."
            exit 1
          fi
          docker build --no-cache --pull \
            --build-arg "VITE_NEON_AUTH_URL=${VITE_NEON_AUTH_URL}" \
            -t ${{ env.IMAGE_BASE }}:${{ github.sha }} \
            -t ${{ env.IMAGE_BASE }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_BASE }}:${{ github.sha }}
          docker push ${{ env.IMAGE_BASE }}:latest

      - name: Deploy to Cloud Run (europe-west2)
        run: |
          gcloud run deploy sophia \
            --image=${{ env.IMAGE_BASE }}:${{ github.sha }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --vpc-connector=sophia-connector \
            --vpc-egress=private-ranges-only \
            --set-env-vars="^|^ADMIN_INGEST_RUN_REAL=1|INGEST_QUEUE_ENABLED=0|SOPHIA_DATA_BACKEND=neon|USE_NEON_AUTH=1|NEON_AUTH_BASE_URL=${{ secrets.NEON_AUTH_BASE_URL }}|PUBLIC_NEON_AUTH_URL=${{ secrets.NEON_AUTH_BASE_URL }}|GCP_PROJECT_ID=${{ env.PROJECT_ID }}|GCP_LOCATION=${{ env.REGION }}|GOOGLE_VERTEX_LOCATION=us-central1|ALLOWED_EMAILS=adam.boon1984@gmail.com,adam.boon1984@googlemail.com,admin@usesophia.app|OWNER_EMAILS=adam.boon1984@gmail.com,adam.boon1984@googlemail.com,admin@usesophia.app|PADDLE_RUNTIME=production|BYOK_DISABLE_CLOUD_KMS_ENCRYPT=1|RESTORMEL_GATEWAY_KEY=${{ env.RESTORMEL_GATEWAY_KEY }}|RESTORMEL_PROJECT_ID=${{ env.RESTORMEL_PROJECT_ID }}|RESTORMEL_ENVIRONMENT_ID=${{ env.RESTORMEL_ENVIRONMENT_ID }}|RESTORMEL_KEYS_BASE=${{ env.RESTORMEL_KEYS_BASE }}|RESTORMEL_BASE_URL=${{ env.RESTORMEL_BASE_URL }}|RESTORMEL_ANALYSE_ROUTE_ID=${{ env.RESTORMEL_ANALYSE_ROUTE_ID }}|RESTORMEL_VERIFY_ROUTE_ID=${{ env.RESTORMEL_VERIFY_ROUTE_ID }}|RESTORMEL_PROJECT_MODEL_REGISTRY_BINDINGS=1" \
            --set-secrets="ANTHROPIC_API_KEY=anthropic-api-key:latest,SURREAL_URL=surreal-db-url:latest,SURREAL_USER=surreal-db-user:latest,SURREAL_PASS=surreal-db-pass:latest,SURREAL_NAMESPACE=surreal-db-namespace:latest,SURREAL_DATABASE=surreal-db-database:latest,VOYAGE_API_KEY=voyage-api-key:latest,GOOGLE_AI_API_KEY=google-ai-api-key:latest,DATABASE_URL=neon-database-url:latest,ADMIN_UIDS=admin-uids:latest,OWNER_UIDS=owner-uids:latest,PADDLE_API_KEY_PRODUCTION=PADDLE_API_KEY_PRODUCTION:latest,PADDLE_WEBHOOK_SECRET_PRODUCTION=PADDLE_WEBHOOK_SECRET_PRODUCTION:latest,PADDLE_PRICE_PRO_GBP_PRODUCTION=PADDLE_PRICE_PRO_GBP_PRODUCTION:latest,PADDLE_PRICE_PRO_USD_PRODUCTION=PADDLE_PRICE_PRO_USD_PRODUCTION:latest,PADDLE_PRICE_PREMIUM_GBP_PRODUCTION=PADDLE_PRICE_PREMIUM_GBP_PRODUCTION:latest,PADDLE_PRICE_PREMIUM_USD_PRODUCTION=PADDLE_PRICE_PREMIUM_USD_PRODUCTION:latest,PADDLE_PRICE_TOPUP_SMALL_GBP_PRODUCTION=PADDLE_PRICE_TOPUP_SMALL_GBP_PRODUCTION:latest,PADDLE_PRICE_TOPUP_SMALL_USD_PRODUCTION=PADDLE_PRICE_TOPUP_SMALL_USD_PRODUCTION:latest,PADDLE_PRICE_TOPUP_LARGE_GBP_PRODUCTION=PADDLE_PRICE_TOPUP_LARGE_GBP_PRODUCTION:latest,PADDLE_PRICE_TOPUP_LARGE_USD_PRODUCTION=PADDLE_PRICE_TOPUP_LARGE_USD_PRODUCTION:latest,PUBLIC_PADDLE_CLIENT_TOKEN_PRODUCTION=PADDLE_CLIENT_TOKEN:latest"

      - name: Route 100% traffic to latest revision
        run: |
          gcloud run services update-traffic sophia \
            --to-latest \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }}

      - name: Health check
        run: |
          URL=$(gcloud run services describe sophia \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Service URL: $URL"
          # Wait up to 60s for the new revision to become healthy
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✓ Health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "✗ Health check failed after 60s — rolling back"
          PREV=$(gcloud run revisions list \
            --service=sophia \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(metadata.name)' \
            --sort-by=~metadata.creationTimestamp \
            --limit=2 | tail -1)
          gcloud run services update-traffic sophia \
            --to-revisions="$PREV=100" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}
          echo "Rolled back to $PREV"
          exit 1

  # ── 4. Manual rollback ─────────────────────────────────────────────────────
  rollback:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_revision != ''
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Roll back to specified revision
        run: |
          REVISION="${{ github.event.inputs.rollback_revision }}"
          echo "Rolling back to: $REVISION"
          gcloud run services update-traffic sophia \
            --to-revisions="$REVISION=100" \
            --region=europe-west2 \
            --project=${{ secrets.GCP_PROJECT_ID }}
          echo "✓ Traffic shifted to $REVISION"
