# Restormel docs: kept separate from deploy.yml (Python toolchain + path filters).
name: Restormel Docs Lint

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/README.md"
      - "docs/LOCAL_DOCS.md"
      - "docs/sophia/**"
      - "scripts/restormel/**"
      - ".github/workflows/docs-lint.yml"
      - ".github/workflows/docs-freshness.yml"
      - ".github/workflows/linear-sync.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/README.md"
      - "docs/LOCAL_DOCS.md"
      - "docs/sophia/**"
      - "scripts/restormel/**"
      - ".github/workflows/docs-lint.yml"
  workflow_dispatch:

concurrency:
  group: restormel-docs-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python requirements
        run: python3 -m pip install -r requirements-python.txt

      - name: Check generated repo docs blocks
        run: python3 scripts/restormel/update_repo_docs.py --check

      - name: Run docs lint
        run: python3 scripts/restormel/docs_lint.py --check-links
