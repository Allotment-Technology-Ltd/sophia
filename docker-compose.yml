services:
  sophia-app:
    build: .
    ports:
      - "3000:8080"
    env_file: .env
    depends_on:
      - surrealdb
    environment:
      - SURREAL_URL=http://surrealdb:8000/rpc

  surrealdb:
    image: surrealdb/surrealdb:v2
    ports:
      - "8000:8000"
    command: start --user root --pass root file:/data/sophia.db
    volumes:
      - surrealdb-data:/data

volumes:
  surrealdb-data:
