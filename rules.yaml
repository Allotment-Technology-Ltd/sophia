---
# SOPHIA — AI Coding Assistant Rules
# Single source of truth for Cursor, GitHub Copilot, and Roo Code
# Place in project root as .rules.yaml

project:
  name: SOPHIA
  description: >
    Structured Ontological & Philosophical Heuristic Intelligence Agent.
    A philosophical reasoning engine that stores knowledge as an argument graph
    and uses a three-pass dialectical pipeline (Analysis → Critique → Synthesis)
    to produce rigorous philosophical analysis.
  domain: usesophia.app

stack:
  frontend: SvelteKit 2 with Svelte 5
  language: TypeScript (strict mode)
  styling: Tailwind CSS with custom design tokens
  database: SurrealDB v2
  ai: Claude API (Sonnet 4.5) via @anthropic-ai/sdk
  hosting: Google Cloud Run via adapter-node
  auth: Auth.js (Phase 5 only)
  payments: Stripe (Phase 6 only)
  package_manager: pnpm
  validation: Zod

never:
  frameworks:
    - React
    - Next.js
    - Vue
    - Angular
    - Nuxt
  databases:
    - PostgreSQL
    - MongoDB
    - Neo4j
    - Firebase
    - Supabase
  orchestration:
    - LangChain
    - LlamaIndex
    - CrewAI
    - AutoGen
    - Semantic Kernel
  other:
    - Lean/Isabelle/Coq (formal theorem provers)
    - npm or yarn (use pnpm only)
    - Svelte legacy syntax ($: reactive, export let)
    - Client-side API keys or secrets

sveltekit:
  file_conventions:
    pages: src/routes/**/+page.svelte
    server_load: src/routes/**/+page.server.ts
    api_endpoints: src/routes/api/**/+server.ts
    layouts: src/routes/**/+layout.svelte
    errors: src/routes/**/+error.svelte
    components: src/lib/components/**/*.svelte
    server_only: src/lib/server/**/*.ts
    types: src/lib/types/**/*.ts
    utilities: src/lib/utils/**/*.ts
    stores: src/lib/stores/**/*.svelte.ts

  svelte5_runes:
    state: "$state(initialValue)"
    derived: "$derived(expression)"
    props: "let { data } = $props()"
    effect: "$effect(() => { ... })"
    banned:
      - "$: reactive declarations"
      - "export let (use $props instead)"
      - "$$props / $$restProps"

  imports:
    internal: "$lib/"
    private_env: "$env/static/private"
    public_env: "$env/static/public (PREFIX with PUBLIC_)"

  rules:
    - All Claude API calls in server routes only, never client-side
    - All SurrealDB queries in server routes only
    - API keys via $env/static/private, never hardcoded

typescript:
  strict: true
  prefer_interface_over_type: true
  no_any: true # mark exceptions with TODO comment
  zod_validation: Claude API responses, user input, external data
  export_types_from: src/lib/types/

surrealdb:
  package: surrealdb (official npm package)
  query_language: SurrealQL (NOT SQL)
  patterns:
    graph_traversal_outgoing: "->relation_type->table"
    graph_traversal_incoming: "<-relation_type<-table"
    vector_search: "WHERE embedding <|N|> $query_embedding"
    create_relation: "RELATE record_a->relation->record_b SET field = value"
    record_id_format: "table:id"
  banned_sql_patterns:
    - JOIN
    - INSERT INTO relation_table
    - Foreign key references
    - Standard SQL aggregate syntax

claude_api:
  model: claude-sonnet-4-5-20250514
  always_stream: true
  always_track_tokens: true
  streaming_to_client: Server-Sent Events (SSE)
  max_tokens_per_pass:
    analysis: 2048
    critique: 1536
    synthesis: 2560
  cost_logging: >
    Log input_tokens, output_tokens, and estimated cost
    for every API call: (input × $3 + output × $15) / 1,000,000
  caching: Implement for identical or near-identical queries
  calls_per_query: exactly 3 (analysis, critique, synthesis) — no more

design_system:
  colors:
    light:
      background: "#F8F7F4"       # off-white, warm
      primary_text: "#2A2725"     # charcoal
      secondary_text: "#6B6359"   # slate gray
      primary_accent: "#6B8E6F"   # sage green
      secondary_accent: "#C67C4E" # copper
      tertiary_accent: "#4A7BA7"  # soft blue (links)
    dark:
      background: "#1A1917"       # near-black, warm
      primary_text: "#E8E6E1"     # off-white
      secondary_text: "#9E9A93"   # warm gray
      primary_accent: "#7FA383"   # sage green (lighter)
      secondary_accent: "#D4936F" # copper (lighter)
      tertiary_accent: "#6FA3D4"  # soft blue (lighter)
    rules:
      - No pure black (#000) or pure white (#FFF) — always warm neutrals
      - No color-only information — pair with text or icon for accessibility
      - WCAG AA compliance on all combinations

  typography:
    primary_font: "Sohne (fallback: Inter, system-ui, sans-serif)"
    monospace_font: "Rec Mono (fallback: JetBrains Mono, monospace)"
    body_size: "1.125rem (18px)"
    body_line_height: 1.7
    heading_line_height: 1.2
    heading_letter_spacing: "-0.02em"
    font_weights:
      regular: 400 # body text
      medium: 500  # subheadings, labels
      bold: 700    # very rare, sparingly

  spacing:
    base_unit: "8px (0.5rem)"
    rule: All spacing as multiples of base unit
    min_touch_target: 44px

  principles:
    - No gamification (points, streaks, achievements)
    - No urgency indicators (red alerts, countdowns)
    - Generous whitespace — contemplative tool
    - Warm, honest error messages (not "Oops!")
    - Never lose user input on error

error_handling:
  claude_api:
    - Retry with exponential backoff (max 3 retries)
    - Graceful degradation if SurrealDB down (query Claude without graph context)
    - Never expose raw error messages to user
    - Log all errors server-side with context
  user_facing:
    - Warm, honest tone
    - Tell user what happened and what they can do
    - Never lose user input

phases:
  current: Check docs/phase-checklist.md
  rules:
    - Do not generate code for features belonging to later phases
    - Phase 2: No database code, context hardcoded or from files
    - Phase 3a: SurrealDB, ethics domain only, domain filter on all retrieval
    - Phase 3b+: Expanding domains, cross-domain relation extraction
    - Phase 4+: Web search, conversation persistence
    - Phase 5+: Auth.js, rate limiting
    - Phase 6+: Stripe, API access layer

documentation:
  location: docs/
  
  structure:
    # Single sources of truth — only these are active
    - ROADMAP.md                   # **CANONICAL** — Current + next 2 phases, always up-to-date
    - architecture.md              # **CANONICAL** — System design, deployment, tech stack
    - STATUS.md (root)             # **CANONICAL** — Project health, deployment status, contacts
    - CHANGELOG.md (root)          # **CANONICAL** — Git-friendly version history
    
    # Implementation guides — follow these when building
    design/:
      - MASTER-IMPLEMENTATION-GUIDE.md  # Phase 3c UI implementation
      - sophia-phase3c-ui-prompt-guide.md
      - sophia-phases-4-7-prompt-guide.md
      - sophia-design-system-B.md        # Design tokens locked (Design B)
    
    # Reference docs — look here for details
    - argument-graph.md            # SurrealDB schema reference
    - three-pass-engine.md         # Engine architecture & dialectical philosophy
    - prompts-reference.md         # All LLM prompt templates (by phase+domain)
    - evaluation-methodology.md    # Testing rubric and ground truth
    - runbooks.md                  # Operational shortcuts, health checks, common commands
    
    # Pivot plan — read once, reference for scope
    - MVP-PIVOT-PLAN.md            # Phase A–J implementation detail (implementation-in-progress)
    - AGENT-IMPLEMENTATION-PROMPT.md # Agent onboarding guide
    - MIGRATION-QUICKSTART.md       # GCP migration quick reference
    - GCP-ORG-MIGRATION.md          # Full migration runbook
    
    # Archives — historical reference only
    archive/:
      - phase-3a-completion-report.md
      - phase-3b-roadmap.md, phase-3b-checklist.md
      - And 7 more historical/completed-phase docs
  
  maintenance:
    frequency: "Every sprint (2 weeks) OR after major milestone"
    
    script: scripts/review-docs.sh
    # Runs:
    #   1. Check ROADMAP.md hasn't drifted (compare to STATUS.md, CHANGELOG.md)
    #   2. Verify all architecture paths exist (broken links detector)
    #   3. Check for docs > 1 year old, flag for archival
    #   4. Ensure design-tokens CSS matches design-system-B.md specs
    
    responsibilities:
      - On release: update ROADMAP + STATUS + CHANGELOG (in one commit)
      - On schema change: update argument-graph.md immediately
      - On prompt tuning: add entry to prompts-reference.md with date
      - On major refactor: schedule architecture.md review
      - On phase completion: move old phase checklists to archive/
    
    rules:
      - Avoid two versions of truth — if in docs/, delete old wiki/blog posts
      - No "TODO: update this" placeholders — file an issue instead, mark with TODO comment
      - Frontmatter: every .md must have last-updated date and phase/status
      - If doc > 4 weeks without update and is marked "active": flag as stale
      - Archive docs must have README.md explaining why they're archived
      - ROADMAP.md is source of truth for what's built — check before answering "is X done?"
  
  conventions:
    # Frontmatter (every doc)
    frontmatter:
      - Last updated: YYYY-MM-DD
      - Status: active | archived | draft | reference
      - Owner: Copilot | human name
      - Related: [link to related docs]
    
    # Sections (standard order for implementation guides)
    implementation_guide_sections:
      1. Overview / Executive Summary
      2. Prerequisites
      3. Architecture Diagram
      4. Implementation Sequence (A, B, C, etc.)
      5. Per-section: Purpose, Changes, Verification
      6. Final Checklist / Quality Gates
    
    # Section structure (runbooks, playbooks)
    runbook_sections:
      1. Quick Start (copy-paste commands)
      2. Prerequisites
      3. Step-by-Step with error handling
      4. Rollback procedure
      5. Verification
      6. Troubleshooting
    
    # Links must be relative, never hardcoded domains
    links:
      - Use relative paths: [link](../docs/architecture.md)
      - Never include domain: ❌ https://github.com/Allotment-Technology-Ltd/sophia/docs/...
      - Tables: prefer Markdown tables, not embeds
    
    code_blocks:
      - Always specify language: ```typescript not ```
      - CLI commands: ```bash
      - Pseudocode: ```typescript with // Pseudocode comments
  
  forbidden:
    - Storing docs outside docs/ (except STATUS.md, CHANGELOG.md, ROADMAP.md at root)
    - Multiple conflicting docs on the same topic (use structure above)
    - "This is outdated" without moving to archive/
    - Promise to update docs later without filing GitHub issue
    - Docs longer than 100 lines without a table of contents
